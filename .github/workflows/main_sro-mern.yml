name: Build and deploy Node.js app to Azure Web App - SRO-MERN

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"

      # ✅ Install backend dependencies
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      # ✅ Install frontend dependencies + build
      - name: Build frontend
        run: |
          cd client
          npm install
          npm run build

      # ✅ Upload BOTH backend + frontend
      - name: Upload full project
        uses: actions/upload-artifact@v4
        with:
          name: full-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download full project
        uses: actions/download-artifact@v4
        with:
          name: full-app

      # ✅ Deploy everything (backend + client/dist)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "SRO-MERN"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
