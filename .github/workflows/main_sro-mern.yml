name: Build and deploy Node.js app to Azure Web App - SRO-MERN

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"

      # 🔥 FIX: go inside backend folder
      - name: Install dependencies (backend)
        run: |
          cd backend
          npm install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A78D728DD48D4ADC8CD4D4A25C551890 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AFE7A7E14DB645A2AF95980DE5EDEDCB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F38BACA710CC40BAA64F744647EBD79C }}

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: "SRO-MERN"
          slot-name: "Production"
          package: .
